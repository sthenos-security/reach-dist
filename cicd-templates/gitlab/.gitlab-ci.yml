# REACHABLE Security Scan — GitLab CI
#
# Copy this file to .gitlab-ci.yml in your repo.
#
# ── Variables ─────────────────────────────────────────────────────────
# Set in: Project → Settings → CI/CD → Variables
#
#   REACHABLE_DIST_REPO  — dist repo (default: sthenos-security/reach-dist)
#   REACHABLE_VERSION    — pin a version (default: latest)
#   FAIL_THRESHOLD       — critical | high | medium | any | none (default: high)
#   REACHABLE_HOME       — shared mount path for self-hosted volume model (optional)
#
# ── Exit codes ────────────────────────────────────────────────────────
#   0 = clean, 2 = findings above threshold, 1 = scan error

variables:
  REACHABLE_DIST_REPO: "sthenos-security/reach-dist"
  REACHABLE_VERSION: ""
  FAIL_THRESHOLD: "high"
  PYTHON_VERSION: "3.11"
  REACH_STATE_DIR: "$CI_PROJECT_DIR/.reachable-state"

stages:
  - install
  - init
  - scan
  - analyze
  - finalize

default:
  image: python:${PYTHON_VERSION}-slim

  # Runner selection:
  #   Managed (GitLab SaaS): remove tags block
  #   Self-managed: set tags to match your runner labels
  # tags:
  #   - self-hosted

  before_script:
    - apt-get update -qq && apt-get install -qq -y curl git 2>/dev/null | tail -1
    - |
      ARGS=""
      [ -n "${REACHABLE_VERSION}" ] && ARGS="--version ${REACHABLE_VERSION}"
      curl -fsSL "https://raw.githubusercontent.com/${REACHABLE_DIST_REPO}/main/install.sh" | bash -s -- $ARGS
    - mkdir -p "${REACH_STATE_DIR}"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

.state_artifact: &state_artifact
  artifacts:
    paths:
      - .reachable-state/
    expire_in: 2 hours
    when: always

# ─────────────────────────────────────────────────────────────────────
install:
  stage: install
  script:
    - reachctl version

# ─────────────────────────────────────────────────────────────────────
init:
  stage: init
  needs: [install]
  script:
    - |
      JSON=$(reachctl pipeline init "${CI_PROJECT_DIR}" --json 2>/dev/null | grep '^{' | tail -1)
      echo "$JSON"
      SESSION_DIR=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['session_dir'])")
      [ -z "$SESSION_DIR" ] && { echo "ERROR: Could not parse session_dir"; exit 1; }
      echo "SESSION_DIR=${SESSION_DIR}" > "${REACH_STATE_DIR}/.session_env"
  <<: *state_artifact

# ─────────────────────────────────────────────────────────────────────
scan:
  stage: scan
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step scan --session "$SESSION_DIR"
  <<: *state_artifact

# ─────────────────────────────────────────────────────────────────────
# secrets/iac/ai/dlp — no scan dependency
# malware/health      — need scan (SBOM in repo.db)
# ─────────────────────────────────────────────────────────────────────
scan-secrets:
  stage: analyze
  needs: [scan]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step secrets --session "$SESSION_DIR"
  <<: *state_artifact

malware:
  stage: analyze
  needs: [scan]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step malware --session "$SESSION_DIR"
  <<: *state_artifact

health:
  stage: analyze
  needs: [scan]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step health --session "$SESSION_DIR"
  <<: *state_artifact

iac:
  stage: analyze
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step iac --session "$SESSION_DIR"
  <<: *state_artifact

ai-security:
  stage: analyze
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step ai --session "$SESSION_DIR"
  <<: *state_artifact

dlp-pii:
  stage: analyze
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step dlp --session "$SESSION_DIR"
  <<: *state_artifact

# ─────────────────────────────────────────────────────────────────────
finalize:
  stage: finalize
  needs: [scan-secrets, malware, health, iac, ai-security, dlp-pii]
  allow_failure:
    exit_codes: 2
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - |
      set +e
      reachctl pipeline finalize --session "$SESSION_DIR" --fail-on "$FAIL_THRESHOLD"
      FINALIZE_EXIT=$?
      mkdir -p build
      find "${REACH_STATE_DIR}" ~/.reachable/scans -type d -name dashboard \
        -exec cp -r {}/ build/dashboard/ \; 2>/dev/null || true
      find "${REACH_STATE_DIR}" ~/.reachable/scans -name "reachable.sarif" \
        -exec cp {} build/reachable.sarif \; 2>/dev/null || true
      exit $FINALIZE_EXIT
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/dashboard/
      - build/reachable.sarif
    reports:
      sast: build/reachable.sarif
