# REACHABLE Security Scan — GitLab CI
#
# Three deployment models:
#
#   A) GitLab SaaS (managed runners) — serial, state via artifacts
#   B) Self-managed runners with shared volume — set REACHABLE_HOME
#   C) GitLab + S3 — set REACH_S3_BUCKET / REACH_S3_REGION / AWS credentials
#
# ── Variables ─────────────────────────────────────────────────────────
# Set in: Project → Settings → CI/CD → Variables
#
#   REACHABLE_DIST_REPO  — dist repo (default: sthenos-security/reach-dist)
#   REACHABLE_VERSION    — pin a version (default: latest)
#   FAIL_THRESHOLD       — critical | high | medium | any | none (default: high)
#   REACHABLE_HOME       — shared mount for self-hosted volume model (optional)
#
# ── Exit codes ────────────────────────────────────────────────────────
#   0 = clean, 2 = findings above threshold, 1 = scan error

variables:
  REACHABLE_DIST_REPO: "sthenos-security/reach-dist"
  REACHABLE_VERSION: ""
  FAIL_THRESHOLD: "high"
  PYTHON_VERSION: "3.11"
  REACH_STATE_DIR: "$CI_PROJECT_DIR/.reachable-state"

stages:
  - install
  - init
  - scan
  - analyze
  - finalize

default:
  image: python:${PYTHON_VERSION}-slim

  # Runner selection:
  #   Managed (GitLab SaaS): remove tags block
  #   Self-managed: set tags to match your runner labels
  # tags:
  #   - self-hosted

  before_script:
    - apt-get update -qq && apt-get install -qq -y curl git 2>/dev/null | tail -1
    - |
      ARGS=""
      [ -n "${REACHABLE_VERSION}" ] && ARGS="--version ${REACHABLE_VERSION}"
      if ! curl -fsSL "https://raw.githubusercontent.com/${REACHABLE_DIST_REPO}/main/install.sh" | bash -s -- $ARGS; then
        echo "ERROR: install.sh failed — check REACHABLE_DIST_REPO and REACHABLE_VERSION"
        exit 1
      fi
      command -v reachctl >/dev/null 2>&1 || { echo "ERROR: reachctl not found after install"; exit 1; }
      reachctl version
    - mkdir -p "${REACH_STATE_DIR}"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

.state_artifact: &state_artifact
  artifacts:
    paths:
      - .reachable-state/
    expire_in: 2 hours
    when: always

# ─────────────────────────────────────────────────────────────────────
install:
  stage: install
  script:
    - reachctl version

# ─────────────────────────────────────────────────────────────────────
init:
  stage: init
  needs: [install]
  script:
    - |
      RAW=$(reachctl pipeline init "${CI_PROJECT_DIR}" --json 2>&1)
      JSON=$(echo "$RAW" | grep '^{' | tail -1)
      if [ -z "$JSON" ]; then
        echo "ERROR: No JSON output from reachctl pipeline init. Full output:"
        echo "$RAW"
        exit 1
      fi
      SESSION_DIR=$(echo "$JSON" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    v = d['session_dir']
    if not v: raise ValueError('session_dir is empty')
    print(v)
except Exception as e:
    sys.stderr.write('Failed to parse session_dir: ' + str(e) + '
')
    sys.exit(1)
") || { echo "ERROR: Failed to parse session_dir — see above"; exit 1; }
      echo "SESSION_DIR=${SESSION_DIR}" > "${REACH_STATE_DIR}/.session_env"
      echo "Session: ${SESSION_DIR}"
  <<: *state_artifact

# ─────────────────────────────────────────────────────────────────────
scan:
  stage: scan
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step scan --session "$SESSION_DIR"
  <<: *state_artifact

# ─────────────────────────────────────────────────────────────────────
# secrets/iac/ai/dlp — no scan dependency
# malware/health      — need scan (SBOM in repo.db)
# ─────────────────────────────────────────────────────────────────────
scan-secrets:
  stage: analyze
  needs: [scan]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step secrets --session "$SESSION_DIR"
  <<: *state_artifact

malware:
  stage: analyze
  needs: [scan]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step malware --session "$SESSION_DIR"
  <<: *state_artifact

health:
  stage: analyze
  needs: [scan]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step health --session "$SESSION_DIR"
  <<: *state_artifact

iac:
  stage: analyze
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step iac --session "$SESSION_DIR"
  <<: *state_artifact

ai-security:
  stage: analyze
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step ai --session "$SESSION_DIR"
  <<: *state_artifact

dlp-pii:
  stage: analyze
  needs: [init]
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - reachctl pipeline step dlp --session "$SESSION_DIR"
  <<: *state_artifact

# ─────────────────────────────────────────────────────────────────────
finalize:
  stage: finalize
  needs: [scan-secrets, malware, health, iac, ai-security, dlp-pii]
  allow_failure:
    exit_codes: 2
  script:
    - source "${REACH_STATE_DIR}/.session_env"
    - |
      set +e
      reachctl pipeline finalize --session "$SESSION_DIR" --fail-on "$FAIL_THRESHOLD"
      FINALIZE_EXIT=$?
      mkdir -p build
      find "${REACH_STATE_DIR}" ~/.reachable/scans -type d -name dashboard \
        -exec cp -r {}/ build/dashboard/ \; 2>/dev/null || true
      find "${REACH_STATE_DIR}" ~/.reachable/scans -name "reachable.sarif" \
        -exec cp {} build/reachable.sarif \; 2>/dev/null || true
      exit $FINALIZE_EXIT
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - build/dashboard/
      - build/reachable.sarif
    reports:
      sast: build/reachable.sarif
