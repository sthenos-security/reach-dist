# REACHABLE Security Scan — GitHub Managed Runners, Distributed via S3
#
# Runs scanner steps in parallel across ephemeral managed runners.
# S3 is the shared state layer — each job syncs only its own raw JSON.
#
# ── AWS authentication — OIDC (recommended) ───────────────────────────
#   1. Create IAM OIDC provider: https://token.actions.githubusercontent.com
#   2. Create IAM role with trust policy for this repo
#   3. Attach S3 policy: GetObject, PutObject, DeleteObject, ListBucket
#   4. Set repo variables: REACH_AWS_ROLE_ARN, REACH_S3_BUCKET, REACH_S3_REGION
#
# ── Repo variables (all optional except AWS ones) ─────────────────────
#   REACHABLE_DIST_REPO  — dist repo (default: sthenos-security/reach-dist)
#   REACHABLE_VERSION    — pin a version (default: latest)
#   FAIL_THRESHOLD       — critical | high | medium | any | none (default: high)
#   REACH_AWS_ROLE_ARN   — IAM role ARN for OIDC
#   REACH_S3_BUCKET      — S3 bucket name
#   REACH_S3_REGION      — S3 region (default: us-east-1)

name: REACHABLE Managed Distributed Scan (S3)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  REACHABLE_DIST_REPO: ${{ vars.REACHABLE_DIST_REPO || 'sthenos-security/reach-dist' }}
  REACHABLE_VERSION: ${{ vars.REACHABLE_VERSION || '' }}
  FAIL_THRESHOLD: ${{ vars.FAIL_THRESHOLD || 'high' }}
  S3_BUCKET: ${{ vars.REACH_S3_BUCKET }}
  S3_REGION: ${{ vars.REACH_S3_REGION || 'us-east-1' }}
  AWS_ROLE_ARN: ${{ vars.REACH_AWS_ROLE_ARN }}

jobs:
  # ============================================================================
  # INIT
  # ============================================================================
  init:
    name: Initialize Pipeline
    runs-on: ubuntu-latest
    outputs:
      session_dir: ${{ steps.init.outputs.session_dir }}
      s3_prefix: ${{ steps.init.outputs.s3_prefix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Initialize Pipeline
        id: init
        run: |
          JSON=$(reachctl pipeline init . --json 2>/dev/null | grep '^{' | tail -1)
          echo "$JSON"
          SESSION_DIR=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['session_dir'])")
          SESSION_ID=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['session_id'])")
          REPO_SLUG=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['repo_name'])")
          [[ -z "$SESSION_DIR" ]] && { echo "::error::Could not parse session_dir from JSON"; exit 1; }
          S3_PREFIX="${REPO_SLUG}/${SESSION_ID}"
          echo "session_dir=${SESSION_DIR}" >> "$GITHUB_OUTPUT"
          echo "s3_prefix=${S3_PREFIX}" >> "$GITHUB_OUTPUT"
      - name: Push initial state to S3
        run: |
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ steps.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/.pipeline-state.json" --include "**/*.db" \
            --region "${{ env.S3_REGION }}"

  # ============================================================================
  # SCAN
  # ============================================================================
  scan:
    name: SBOM + Vulnerabilities
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Grype DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/grype
          key: grype-db-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/go.sum', '**/package-lock.json') }}
          restore-keys: grype-db-${{ runner.os }}-
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull state from S3
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --region "${{ env.S3_REGION }}"
      - name: Run
        run: reachctl pipeline step scan --session "${{ needs.init.outputs.session_dir }}"
      - name: Push outputs to S3
        run: |
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/.pipeline-state.json" --include "**/.step-scan.json" \
            --include "**/*.db" --include "**/raw/grype-vulns.json" \
            --region "${{ env.S3_REGION }}"

  # ============================================================================
  # PARALLEL STEPS
  # secrets, iac, ai, dlp → need init only
  # malware, health        → need scan (SBOM in repo.db)
  # ============================================================================

  secrets:
    name: Secrets + CWE
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull, run, push
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --exclude "*" --include "**/.pipeline-state.json" --include "**/*.db" \
            --region "${{ env.S3_REGION }}"
          reachctl pipeline step secrets --session "${{ needs.init.outputs.session_dir }}"
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/raw/security-findings.json" --include "**/.step-secrets.json" \
            --region "${{ env.S3_REGION }}"

  malware:
    name: Malware Detection
    needs: [init, scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull, run, push
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --region "${{ env.S3_REGION }}"
          reachctl pipeline step malware --session "${{ needs.init.outputs.session_dir }}"
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/raw/malware.json" --include "**/.step-malware.json" \
            --region "${{ env.S3_REGION }}"

  health:
    name: Package Health
    needs: [init, scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull, run, push
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --region "${{ env.S3_REGION }}"
          reachctl pipeline step health --session "${{ needs.init.outputs.session_dir }}"
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/raw/health.json" --include "**/.step-health.json" \
            --region "${{ env.S3_REGION }}"

  iac:
    name: IaC Scan
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull, run, push
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --exclude "*" --include "**/.pipeline-state.json" --include "**/*.db" \
            --region "${{ env.S3_REGION }}"
          reachctl pipeline step iac --session "${{ needs.init.outputs.session_dir }}"
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/raw/iac.json" --include "**/.step-iac.json" \
            --region "${{ env.S3_REGION }}"

  ai:
    name: AI/LLM Security
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull, run, push
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --exclude "*" --include "**/.pipeline-state.json" --include "**/*.db" \
            --region "${{ env.S3_REGION }}"
          reachctl pipeline step ai --session "${{ needs.init.outputs.session_dir }}"
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/raw/ai-security.json" --include "**/.step-ai.json" \
            --region "${{ env.S3_REGION }}"

  dlp:
    name: DLP/PII Scan
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull, run, push
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --exclude "*" --include "**/.pipeline-state.json" --include "**/*.db" \
            --region "${{ env.S3_REGION }}"
          reachctl pipeline step dlp --session "${{ needs.init.outputs.session_dir }}"
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/raw/dlp-security.json" --include "**/.step-dlp.json" \
            --region "${{ env.S3_REGION }}"

  # ============================================================================
  # FINALIZE
  # ============================================================================
  finalize:
    name: Finalize + Dashboard
    needs: [init, scan, secrets, malware, health, iac, ai, dlp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.S3_REGION }}
      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS
      - name: Pull complete state from S3
        run: |
          aws s3 sync "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            ~/.reachable/scans/ --region "${{ env.S3_REGION }}"
      - name: Finalize
        id: finalize
        continue-on-error: true
        run: |
          set +e
          reachctl pipeline finalize --session "${{ needs.init.outputs.session_dir }}" --fail-on "${{ env.FAIL_THRESHOLD }}"
          FINALIZE_EXIT=$?
          echo "finalize_exit=${FINALIZE_EXIT}" >> "$GITHUB_OUTPUT"
          [[ $FINALIZE_EXIT -eq 2 ]] && echo "::warning::Findings above threshold '${{ env.FAIL_THRESHOLD }}'"
          [[ $FINALIZE_EXIT -eq 1 ]] && echo "::error::Finalize failed"
          exit $FINALIZE_EXIT
      - name: Push dashboard to S3
        if: always()
        run: |
          aws s3 sync ~/.reachable/scans/ \
            "s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/state/" \
            --exclude "*" --include "**/dashboard/**" --include "**/*.sarif" \
            --include "**/raw/cve-analyzed.json" --include "**/raw/call-graph.json" \
            --region "${{ env.S3_REGION }}"
      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: ~/.reachable/scans/**/dashboard/
          retention-days: 30
      - name: Upload SARIF to GitHub Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ~/.reachable/scans/
        continue-on-error: true
      - name: Post Summary
        if: always()
        run: |
          EXIT="${{ steps.finalize.outputs.finalize_exit }}"
          case "$EXIT" in
            0) STATUS="✅ Clean" ;;
            2) STATUS="⚠️ Findings above threshold (${{ env.FAIL_THRESHOLD }})" ;;
            *) STATUS="❌ Error (exit ${EXIT})" ;;
          esac
          {
            echo "## 🔒 REACHABLE Managed Distributed Scan (S3)"
            echo "**Status:** ${STATUS} | **Session:** ${{ needs.init.outputs.session_dir }}"
            echo "**S3:** \`s3://${{ env.S3_BUCKET }}/${{ needs.init.outputs.s3_prefix }}/\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce Threshold
        if: always()
        run: |
          EXIT="${{ steps.finalize.outputs.finalize_exit }}"
          [[ "$EXIT" == "1" || "$EXIT" == "2" ]] && exit "$EXIT" || exit 0
