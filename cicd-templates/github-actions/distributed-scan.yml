# REACHABLE Distributed Security Scan (GitHub Actions)
#
# Copy this file to .github/workflows/reachable-scan.yml in your repo.
#
# Runs security analysis in parallel across multiple runners.
# State is shared between jobs via GitHub Artifacts.
#
# Step dependencies:
#   init ──────────┬── scan ──┬── malware
#                  │          └── health
#                  ├── secrets
#                  ├── iac
#                  ├── ai
#                  └── dlp
#   all ───────────── finalize
#
# No secrets required — wheels are downloaded from the public reach-dist repo.
# Pin REACHABLE_VERSION for reproducible builds; leave empty for latest.

name: REACHABLE Distributed Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

env:
  REACHABLE_VERSION: ""  # Leave empty for latest, or pin: "1.0.0b16"
  REACHABLE_DIST_REPO: "sthenos-security/reach-dist"
  FAIL_THRESHOLD: "high"  # critical | high | medium | any | none

jobs:
  init:
    name: Initialize Pipeline
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.init.outputs.session_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install REACHABLE
        run: |
          VERSION="${{ env.REACHABLE_VERSION }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${{ env.REACHABLE_DIST_REPO }}/contents/wheels" | python3 -c "import sys,json;d=sorted([e['name'] for e in json.load(sys.stdin) if e['type']=='dir' and e['name'].startswith('v')]);print(d[-1].lstrip('v'))")
          fi
          PY_TAG="cp$(python3 -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          WHEEL="reachable-${VERSION}-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/wheels/v${VERSION}/${WHEEL}" -o "/tmp/${WHEEL}"
          pip install "/tmp/${WHEEL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Initialize Pipeline
        id: init
        run: |
          OUTPUT=$(reachctl pipeline init . 2>&1)
          echo "$OUTPUT"
          SESSION_ID=$(echo "$OUTPUT" | grep -oE '[0-9]{8}-[0-9]{6}-[a-z0-9]+' | head -1)
          [[ -z "$SESSION_ID" ]] && { echo "::error::Could not parse session_id"; exit 1; }
          echo "session_id=${SESSION_ID}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: session-init
          path: ~/.reachable/scans/
          retention-days: 1

  scan:
    name: SBOM + Vulnerabilities
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache Grype DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/grype
          key: grype-db-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/go.sum', '**/package-lock.json') }}
          restore-keys: grype-db-${{ runner.os }}-
      - name: Install REACHABLE
        run: |
          VERSION="${{ env.REACHABLE_VERSION }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${{ env.REACHABLE_DIST_REPO }}/contents/wheels" | python3 -c "import sys,json;d=sorted([e['name'] for e in json.load(sys.stdin) if e['type']=='dir' and e['name'].startswith('v')]);print(d[-1].lstrip('v'))")
          fi
          PY_TAG="cp$(python3 -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          WHEEL="reachable-${VERSION}-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/wheels/v${VERSION}/${WHEEL}" -o "/tmp/${WHEEL}"
          pip install "/tmp/${WHEEL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          name: session-init
          path: ~/.reachable/scans/
      - run: reachctl pipeline step scan --session ${{ needs.init.outputs.session_id }}
      - uses: actions/upload-artifact@v4
        with:
          name: step-scan
          path: ~/.reachable/scans/
          retention-days: 1

  secrets:
    name: Secrets + CWE
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install REACHABLE
        run: |
          VERSION="${{ env.REACHABLE_VERSION }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${{ env.REACHABLE_DIST_REPO }}/contents/wheels" | python3 -c "import sys,json;d=sorted([e['name'] for e in json.load(sys.stdin) if e['type']=='dir' and e['name'].startswith('v')]);print(d[-1].lstrip('v'))")
          fi
          PY_TAG="cp$(python3 -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          WHEEL="reachable-${VERSION}-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/wheels/v${VERSION}/${WHEEL}" -o "/tmp/${WHEEL}"
          pip install "/tmp/${WHEEL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          name: session-init
          path: ~/.reachable/scans/
      - run: reachctl pipeline step secrets --session ${{ needs.init.outputs.session_id }}
      - uses: actions/upload-artifact@v4
        with:
          name: step-secrets
          path: ~/.reachable/scans/
          retention-days: 1

  malware:
    name: Malware Detection
    needs: [init, scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install REACHABLE
        run: |
          VERSION="${{ env.REACHABLE_VERSION }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${{ env.REACHABLE_DIST_REPO }}/contents/wheels" | python3 -c "import sys,json;d=sorted([e['name'] for e in json.load(sys.stdin) if e['type']=='dir' and e['name'].startswith('v')]);print(d[-1].lstrip('v'))")
          fi
          PY_TAG="cp$(python3 -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          WHEEL="reachable-${VERSION}-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/wheels/v${VERSION}/${WHEEL}" -o "/tmp/${WHEEL}"
          pip install "/tmp/${WHEEL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          name: step-scan
          path: ~/.reachable/scans/
      - run: reachctl pipeline step malware --session ${{ needs.init.outputs.session_id }}
      - uses: actions/upload-artifact@v4
        with:
          name: step-malware
          path: ~/.reachable/scans/
          retention-days: 1

  health:
    name: Package Health
    needs: [init, scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install REACHABLE
        run: |
          VERSION="${{ env.REACHABLE_VERSION }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${{ env.REACHABLE_DIST_REPO }}/contents/wheels" | python3 -c "import sys,json;d=sorted([e['name'] for e in json.load(sys.stdin) if e['type']=='dir' and e['name'].startswith('v')]);print(d[-1].lstrip('v'))")
          fi
          PY_TAG="cp$(python3 -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          WHEEL="reachable-${VERSION}-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/wheels/v${VERSION}/${WHEEL}" -o "/tmp/${WHEEL}"
          pip install "/tmp/${WHEEL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          name: step-scan
          path: ~/.reachable/scans/
      - run: reachctl pipeline step health --session ${{ needs.init.outputs.session_id }}
      - uses: actions/upload-artifact@v4
        with:
          name: step-health
          path: ~/.reachable/scans/
          retention-days: 1

  iac:
    name: IaC Scan
    needs: init
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install REACHABLE
        run: |
          VERSION="${{ env.REACHABLE_VERSION }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -fsSL "https://api.github.com/repos/${{ env.REACHABLE_DIST_REPO }}/contents/wheels" | python3 -c "import sys,json;d=sorted([e['name'] for e in json.load(sys.stdin) if e['type']=='dir' and e['name'].startswith('v')]);print(d[-1].lstrip('v'))")
          fi
          PY_TAG="cp$(python3 -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          WHEEL="reachable-${VERSION}-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/wheels/v${VERSION}/${WHEEL}" -o "/tmp/${WHEEL}"
          pip install "/tmp/${WHEEL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          name: session-init
