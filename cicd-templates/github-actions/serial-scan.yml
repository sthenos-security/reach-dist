# REACHABLE Security Scan — Serial (GitHub Actions)
#
# Copy this file to .github/workflows/reachable-scan.yml in your repo.
#
# Runs all pipeline steps sequentially on a single GitHub-hosted runner.
# No artifact passing — session state lives on the runner filesystem.
#
# No secrets required — wheels are downloaded from the public reach-dist repo.
# Pin REACHABLE_VERSION for reproducible builds; leave empty for latest.

name: REACHABLE Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

env:
  REACHABLE_VERSION: ""  # Leave empty for latest, or pin: "1.0.0b16"
  REACHABLE_DIST_REPO: "sthenos-security/reach-dist"
  FAIL_THRESHOLD: "high"  # critical | high | medium | any | none

jobs:
  scan:
    name: REACHABLE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Grype DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/grype
          key: grype-db-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/go.sum', '**/package-lock.json') }}
          restore-keys: grype-db-${{ runner.os }}-

      - name: Install REACHABLE
        run: |
          VERSION="${{ env.REACHABLE_VERSION }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -sL "https://api.github.com/repos/${{ env.REACHABLE_DIST_REPO }}/releases/latest" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
            echo "Resolved latest: ${VERSION}"
          fi
          PY_TAG="cp$(python3 -c 'import sys; print(f"{sys.version_info.major}{sys.version_info.minor}")')"
          WHEEL="reachable-${VERSION}-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          curl -fsSL "https://github.com/${{ env.REACHABLE_DIST_REPO }}/releases/download/v${VERSION}/${WHEEL}" -o "/tmp/${WHEEL}"
          pip install "/tmp/${WHEEL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Initialize Pipeline
        run: |
          JSON=$(reachctl pipeline init . --json 2>/dev/null | grep '^{' | tail -1)
          echo "$JSON"
          SESSION_DIR=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['session_dir'])")
          [[ -z "$SESSION_DIR" ]] && { echo "::error::Could not parse session directory"; exit 1; }
          echo "SESSION_DIR=${SESSION_DIR}" >> "$GITHUB_ENV"
          echo "::notice::Directory: ${SESSION_DIR}"

      - name: Scan — SBOM + Vulnerabilities
        run: reachctl pipeline step scan --session "$SESSION_DIR"

      - name: Secrets + CWE
        run: reachctl pipeline step secrets --session "$SESSION_DIR"

      - name: Malware
        run: reachctl pipeline step malware --session "$SESSION_DIR"

      - name: Package Health
        run: reachctl pipeline step health --session "$SESSION_DIR"

      - name: IaC
        run: reachctl pipeline step iac --session "$SESSION_DIR"

      - name: AI/LLM Security
        run: reachctl pipeline step ai --session "$SESSION_DIR"

      - name: DLP/PII
        run: reachctl pipeline step dlp --session "$SESSION_DIR"

      - name: Finalize — Reachability + Dashboard
        id: finalize
        continue-on-error: true
        run: |
          set +e
          reachctl pipeline finalize --session "$SESSION_DIR" --fail-on "${{ env.FAIL_THRESHOLD }}"
          FINALIZE_EXIT=$?
          echo "finalize_exit=${FINALIZE_EXIT}" >> "$GITHUB_OUTPUT"
          [[ $FINALIZE_EXIT -eq 2 ]] && echo "::warning::Findings above threshold '${{ env.FAIL_THRESHOLD }}'"
          [[ $FINALIZE_EXIT -eq 1 ]] && echo "::error::Finalize failed"
          exit $FINALIZE_EXIT

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: ~/.reachable/scans/**/dashboard/
          retention-days: 30

      - name: Export SARIF
        if: always()
        run: |
          reachctl export --repo . --format sarif \
            --repo-uri https://github.com/${{ github.repository }} \
            --output /tmp/reachable.sarif || true

      - name: Upload SARIF Artifact
        if: always() && hashFiles('/tmp/reachable.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sarif-report
          path: /tmp/reachable.sarif
          retention-days: 30

      - name: Upload to GitHub Security Tab
        if: always() && hashFiles('/tmp/reachable.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/reachable.sarif
          category: reachable
        continue-on-error: true

      - name: Post Summary
        if: always()
        run: |
          EXIT="${{ steps.finalize.outputs.finalize_exit }}"
          case "$EXIT" in
            0) STATUS="✅ Clean" ;;
            2) STATUS="⚠️ Findings above threshold (${{ env.FAIL_THRESHOLD }})" ;;
            *) STATUS="❌ Error (exit ${EXIT})" ;;
          esac
          {
            echo "## 🔒 REACHABLE Security Scan"
            echo "**Status:** ${STATUS} | **Session:** ${SESSION_DIR}"
            echo ""
            echo "Scanners: CVE · Secrets+CWE · Malware · Health · IaC · AI/LLM · DLP/PII"
            echo "| Artifact | Location |"
            echo "|----------|----------|"
            echo "| 📊 Dashboard | Actions → Artifacts → \`security-dashboard\` |"
            echo "| 📋 SARIF | Security → Code scanning alerts |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Threshold
        if: always()
        run: |
          EXIT="${{ steps.finalize.outputs.finalize_exit }}"
          [[ "$EXIT" == "1" || "$EXIT" == "2" ]] && exit "$EXIT" || exit 0
