# REACHABLE Security Scan — Serial (GitHub-Managed Runners)
#
# Runs all pipeline steps sequentially on a single GitHub-hosted runner.
# Session state lives on the runner's local filesystem.
#
# ── Repo variables (all optional) ────────────────────────────────────
#   REACHABLE_DIST_REPO  — dist repo (default: sthenos-security/reach-dist)
#   REACHABLE_VERSION    — pin a version (default: latest)
#   FAIL_THRESHOLD       — critical | high | medium | any | none (default: high)
#   REACHABLE_GATE_ACTOR — restrict manual triggers to this actor (default: open)

name: REACHABLE Serial Scan

on:
  workflow_dispatch:

env:
  REACHABLE_DIST_REPO: ${{ vars.REACHABLE_DIST_REPO || 'sthenos-security/reach-dist' }}
  REACHABLE_VERSION: ${{ vars.REACHABLE_VERSION || '' }}
  FAIL_THRESHOLD: ${{ vars.FAIL_THRESHOLD || 'high' }}

jobs:
  scan:
    name: REACHABLE Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gate — Check authorized actor
        if: github.event_name == 'workflow_dispatch' && vars.REACHABLE_GATE_ACTOR != ''
        run: |
          if [[ "${{ github.actor }}" != "${{ vars.REACHABLE_GATE_ACTOR }}" ]]; then
            echo "❌ Not authorized: ${{ github.actor }}"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Grype DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/grype
          key: grype-db-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/go.sum', '**/package-lock.json') }}
          restore-keys: grype-db-${{ runner.os }}-

      - name: Install REACHABLE
        run: |
          ARGS=""
          [[ -n "${{ env.REACHABLE_VERSION }}" ]] && ARGS="--version ${{ env.REACHABLE_VERSION }}"
          curl -fsSL "https://raw.githubusercontent.com/${{ env.REACHABLE_DIST_REPO }}/main/install.sh" | bash -s -- $ARGS

      - name: Initialize Pipeline
        run: |
          JSON=$(reachctl pipeline init . --json 2>/dev/null | grep '^{' | tail -1)
          echo "$JSON"
          SESSION_DIR=$(echo "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['session_dir'])")
          [[ -z "$SESSION_DIR" ]] && { echo "::error::Could not parse session_dir from JSON"; exit 1; }
          echo "SESSION_DIR=${SESSION_DIR}" >> "$GITHUB_ENV"

      - name: Scan — SBOM + Vulnerabilities
        run: reachctl pipeline step scan --session "$SESSION_DIR"

      - name: Secrets + CWE
        run: reachctl pipeline step secrets --session "$SESSION_DIR"

      - name: Malware
        run: reachctl pipeline step malware --session "$SESSION_DIR"

      - name: Health
        run: reachctl pipeline step health --session "$SESSION_DIR"

      - name: IaC
        run: reachctl pipeline step iac --session "$SESSION_DIR"

      - name: AI/LLM Security
        run: reachctl pipeline step ai --session "$SESSION_DIR"

      - name: DLP/PII
        run: reachctl pipeline step dlp --session "$SESSION_DIR"

      - name: Finalize — Reachability Analysis + Dashboard
        id: finalize
        continue-on-error: true
        run: |
          set +e
          reachctl pipeline finalize --session "$SESSION_DIR" --fail-on "${{ env.FAIL_THRESHOLD }}"
          FINALIZE_EXIT=$?
          echo "finalize_exit=${FINALIZE_EXIT}" >> "$GITHUB_OUTPUT"
          [[ $FINALIZE_EXIT -eq 2 ]] && echo "::warning::Findings above threshold '${{ env.FAIL_THRESHOLD }}'"
          [[ $FINALIZE_EXIT -eq 1 ]] && echo "::error::Finalize failed"
          exit $FINALIZE_EXIT

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: ~/.reachable/scans/**/dashboard/
          retention-days: 30

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sarif-report
          path: /tmp/reachable.sarif
          retention-days: 30

      - name: Upload to GitHub Security Tab
        if: always() && hashFiles('/tmp/reachable.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/reachable.sarif
          category: reachable
        continue-on-error: true

      - name: Post Summary
        if: always()
        run: |
          EXIT="${{ steps.finalize.outputs.finalize_exit }}"
          case "$EXIT" in
            0) STATUS="✅ Clean" ;;
            2) STATUS="⚠️ Findings above threshold (${{ env.FAIL_THRESHOLD }})" ;;
            *) STATUS="❌ Scan error (exit ${EXIT})" ;;
          esac
          {
            echo "## 🔒 REACHABLE Security Scan"
            echo "**Status:** ${STATUS} | **Session:** ${SESSION_DIR}"
            echo "Scanners: CVE · Secrets/CWE · Malware · Health · IaC · AI/LLM · DLP/PII"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Threshold
        if: always()
        run: |
          EXIT="${{ steps.finalize.outputs.finalize_exit }}"
          [[ "$EXIT" == "1" || "$EXIT" == "2" ]] && exit "$EXIT" || exit 0
